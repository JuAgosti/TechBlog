<!DOCTYPE html>

<html xmlns:th="http://thymeleaf.org">
<head>
    <title>TechBlog</title>
    <!--CSS-->
    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
            rel="stylesheet">
</head>

<body>

<header>
    <nav class="navbar bg-body-tertiary">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">TechBlog</span>
            <a href="/newpost" class="btn btn-primary" role="button">Novo Post</a>
        </div>
    </nav>
</header>

<section>
    <div class="container" style="width: 60%; padding-bottom: 30px;";>

        <div class="card shadow-sm bg-white rounded"
             style="margin-top: 20px;"
             th:each="post : ${posts}">

            <div class="card-body">

                <p class="card-subtitle mb-2 text-muted"
                   style="font-size: 0.8rem;">
                    <span th:text="${post.autor}"></span>
                    -
                    <span th:text="${post.dataPostagem}"></span>
                </p>

                <h4 class="card-title"
                    style="font-weight: bold; padding-top: 5px;">

                    <a th:href="@{/posts/{id}(id=${post.id})}"
                       style="color:black;text-decoration:none;">

                        <span th:text="${post.titulo}"></span>

                    </a>

                </h4>

                <p class="card-text">
                    <span th:utext="${#strings.abbreviate(post.texto, 400)}"></span>
                </p>

                <div class="mt-3">

                    <a th:href="@{/posts/{id}(id=${post.id})}"
                       class="btn btn-primary btn-sm">
                        Ler mais
                    </a>

                    <a th:href="@{/delete/{id}(id=${post.id})}"
                       class="btn btn-danger btn-sm"
                       onclick="return confirm('Tem certeza que deseja excluir este post?');">
                        Excluir
                    </a>

                    <a th:href="@{/edit/{id}(id=${post.id})}"
                       class="btn btn-warning btn-sm">
                        Editar
                    </a>

                </div>

            </div>

        </div>

    </div>
</section>

<div th:replace="fragments/footer :: footer"></div>

</body>
</html>
